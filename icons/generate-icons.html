<!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function drawIcon(canvas) {
  const s = canvas.width;
  const ctx = canvas.getContext("2d");
  const g = ctx.createLinearGradient(0, 0, s, s);
  g.addColorStop(0, "#1a1a2e");
  g.addColorStop(1, "#16213e");
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.roundRect(0, 0, s, s, s * 0.22);
  ctx.fill();
  ctx.font = `${s * 0.55}px serif`;
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("☁", s / 2, s / 2 + s * 0.04);
  const a = canvas.toDataURL("image/png");
  const link = document.createElement("a");
  link.href = a;
  link.download = `icon-${s}.png`;
  link.textContent = `Download icon-${s}.png`;
  link.style.display = "block";
  document.body.appendChild(link);
}
drawIcon(document.getElementById("c192"));
drawIcon(document.getElementById("c512"));
</script>
</body>
</html>
